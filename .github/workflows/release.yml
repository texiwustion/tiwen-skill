name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependency
        run: python -m pip install --quiet pyyaml

      - name: Validate and package
        run: python3 .github/scripts/validate.py

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tiwen-skill.skill
          body_path: GITHUB_RELEASE_0.1.0.md
